<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyDrugs - Loja Virtual</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; color: #333; }
    header { background: linear-gradient(90deg, #ff6f61, #ffcc70); color: white; padding: 20px; text-align: center; font-size: 2rem; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    nav { background: #fff; display: flex; justify-content: center; gap: 20px; padding: 10px; border-bottom: 1px solid #eee; }
    nav a { text-decoration: none; color: #ff6f61; font-weight: bold; }
    .banner { background: url('https://picsum.photos/1200/400?random=1') center/cover; height: 300px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
    .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card h3 { margin: 10px; color: #ff6f61; }
    .card p { margin: 10px; }
    .card button { background: #ff6f61; border: none; color: white; padding: 10px; margin: 10px; width: calc(100% - 20px); border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
    .card button:hover { background: #e85b50; }
    #cart { position: fixed; right: 20px; bottom: 20px; background: #ffcc70; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-weight: bold; cursor: pointer; }
    #checkoutModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
    .checkout-box { background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; width: 90%; }
    .checkout-box h2 { margin-top: 0; color: #ff6f61; }
    .checkout-box label { display: block; margin: 10px 0 5px; }
    .checkout-box input, .checkout-box select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
    .checkout-box button { margin-top: 15px; width: 100%; background: #ff6f61; border: none; padding: 10px; color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer; }
    .checkout-box button:hover { background: #e85b50; }
  </style>
</head>
<body>
  <header>MyDrugs</header>
  <nav>
    <a href="#">Início</a>
    <a href="#produtos">Produtos</a>
    <a href="#contato">Contato</a>
  </nav>
  <div class="banner">Bem-vindo à MyDrugs!</div>
  <section id="produtos" class="products">
    <div class="card">
      <img src="https://picsum.photos/300/200?random=2" alt="Produto 1">
      <h3>Produto 1</h3>
      <p>Descrição breve do produto 1.</p>
      <p><strong>R$ 49,90</strong></p>
      <button onclick="addToCart('Produto 1', 49.90)">Adicionar ao Carrinho</button>
    </div>
    <div class="card">
      <img src="https://picsum.photos/300/200?random=3" alt="Produto 2">
      <h3>Produto 2</h3>
      <p>Descrição breve do produto 2.</p>
      <p><strong>R$ 79,90</strong></p>
      <button onclick="addToCart('Produto 2', 79.90)">Adicionar ao Carrinho</button>
    </div>
    <div class="card">
      <img src="https://picsum.photos/300/200?random=4" alt="Produto 3">
      <h3>Produto 3</h3>
      <p>Descrição breve do produto 3.</p>
      <p><strong>R$ 99,90</strong></p>
      <button onclick="addToCart('Produto 3', 99.90)">Adicionar ao Carrinho</button>
    </div>
  </section>

  <div id="cart" onclick="showCart()">🛒 Carrinho (0)</div>

  <div id="checkoutModal">
    <div class="checkout-box">
      <h2>Finalizar Compra</h2>
      <div id="checkoutItems"></div>
      <form onsubmit="finalizePurchase(event)">
        <label>Nome Completo</label>
        <input type="text" required>
        <label>Email</label>
        <input type="email" required>
        <label>Endereço</label>
        <input type="text" required>
        <label>Forma de Pagamento</label>
        <select id="paymentMethod" required>
          <option value="cartao">Cartão de Crédito</option>
          <option value="pix">Pix</option>
        </select>
        <button type="submit">Confirmar Pedido</button>
      </form>
    </div>
  </div>

  <script>
    let cart = [];
    function addToCart(product, price) {
      cart.push({ product, price });
      document.getElementById('cart').innerText = `🛒 Carrinho (${cart.length})`;
      alert(product + " adicionado ao carrinho!");
    }
    function showCart() {
      if(cart.length === 0) {
        alert("Seu carrinho está vazio!");
        return;
      }
      let checkoutItems = document.getElementById("checkoutItems");
      checkoutItems.innerHTML = "<h3>Itens no carrinho:</h3>";
      let total = 0;
      cart.forEach(item => {
        checkoutItems.innerHTML += `<p>- ${item.product}: R$ ${item.price.toFixed(2)}</p>`;
        total += item.price;
      });
      checkoutItems.innerHTML += `<p><strong>Total: R$ ${total.toFixed(2)}</strong></p>`;
      document.getElementById("checkoutModal").style.display = "flex";
    }
    function finalizePurchase(event) {
      event.preventDefault();
      const payment = document.getElementById("paymentMethod").value;
      let paymentText = payment === "pix" ? "Pix" : "Cartão de Crédito";
      alert("Pedido confirmado! Forma de pagamento: " + paymentText + ". Obrigado por comprar na MyDrugs.");
      cart = [];
      document.getElementById('cart').innerText = `🛒 Carrinho (0)`;
      document.getElementById("checkoutModal").style.display = "none";
    }
    window.onclick = function(event) {
      const modal = document.getElementById("checkoutModal");
      if (event.target === modal) {
        modal.style.display = "none";
      }
    }
  </script>
</body>
</html>
